name: 00 Build tvOS IPA From Source ZIP - UNIVERSAL RECURSIVE

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted
          mkdir -p extracted

      - name: Find newest ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | sort | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP found."
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Using ZIP:"
          echo "$ZIP_FILE"

      - name: Extract root ZIP
        run: |
          unzip -oq "$ZIP_FILE" -d extracted

      - name: Extract nested ZIPs recursively
        run: |
          while true; do

            INNER_ZIP=$(find extracted -type f -name "*.zip" | head -n 1)

            if [ -z "$INNER_ZIP" ]; then
              echo "No more nested ZIPs."
              break
            fi

            echo "Extracting nested ZIP:"
            echo "$INNER_ZIP"

            TARGET_DIR=$(dirname "$INNER_ZIP")/nested

            mkdir -p "$TARGET_DIR"

            unzip -oq "$INNER_ZIP" -d "$TARGET_DIR"

            rm -f "$INNER_ZIP"

          done

      - name: Show extracted structure
        run: |
          find extracted | head -n 300

      - name: Find project.yml
        run: |
          PROJECT_YML=$(find extracted -type f -name "project.yml" | head -n 1)

          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found."
            exit 1
          fi

          echo "FOUND PROJECT:"
          echo "$PROJECT_YML"

          echo "PROJECT_YML=$PROJECT_YML" >> $GITHUB_ENV

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd "$(dirname "$PROJECT_YML")"

          xcodegen generate

      - name: Find generated Xcode project
        run: |
          XCODEPROJ=$(find extracted -name "*.xcodeproj" | head -n 1)

          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: .xcodeproj not generated."
            exit 1
          fi

          echo "FOUND XCODE PROJECT:"
          echo "$XCODEPROJ"

          echo "XCODEPROJ=$XCODEPROJ" >> $GITHUB_ENV

      - name: Build tvOS app unsigned
        run: |
          APP_DIR=$(dirname "$XCODEPROJ")

          cd "$APP_DIR"

          xcodebuild \
            -project "$(basename "$XCODEPROJ")" \
            -scheme DebridChannelsTVOS \
            -sdk appletvsimulator \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Find built app
        run: |
          APP_FILE=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)

          if [ -z "$APP_FILE" ]; then
            echo "ERROR: Built app not found."
            exit 1
          fi

          echo "APP_FILE=$APP_FILE" >> $GITHUB_ENV

      - name: Create IPA
        run: |
          rm -rf Payload
          mkdir Payload

          cp -R "$APP_FILE" Payload/

          zip -qry DebridChannelsTVOS_unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS-Unsigned-IPA
          path: DebridChannelsTVOS_unsigned.ipa
