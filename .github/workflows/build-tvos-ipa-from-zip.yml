name: 00 Build tvOS IPA From Source ZIP - UNIVERSAL DEVICE BUILD

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "*.zip"
      - ".github/workflows/**"

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted
          rm -rf build
          rm -rf Payload
          rm -f DebridChannelsTVOS_unsigned.ipa
          mkdir -p extracted

      - name: Show ZIP files in repository
        run: |
          echo "Available ZIP files:"
          find . -maxdepth 1 -type f -name "*.zip" | sort -V

      - name: Find highest version tvOS ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "000_DebridChannels_tvOS_READY_UPLOAD_v*.zip" | sort -V | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No tvOS source ZIP found."
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

          echo "Using highest version ZIP:"
          echo "$ZIP_FILE"

      - name: Extract root ZIP
        run: |
          unzip -oq "$ZIP_FILE" -d extracted

      - name: Extract nested ZIPs recursively
        run: |
          while true; do

            INNER_ZIP=$(find extracted -type f -name "*.zip" | head -n 1)

            if [ -z "$INNER_ZIP" ]; then
              echo "No more nested ZIPs."
              break
            fi

            echo "Extracting nested ZIP:"
            echo "$INNER_ZIP"

            TARGET_DIR="$(dirname "$INNER_ZIP")/nested"

            mkdir -p "$TARGET_DIR"

            unzip -oq "$INNER_ZIP" -d "$TARGET_DIR"

            rm -f "$INNER_ZIP"

          done

      - name: Show extracted structure
        run: |
          echo "Extracted files:"
          find extracted | head -n 500

      - name: Find project.yml
        run: |
          PROJECT_YML=$(find extracted -type f -name "project.yml" | head -n 1)

          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found."
            exit 1
          fi

          echo "FOUND PROJECT:"
          echo "$PROJECT_YML"

          echo "PROJECT_YML=$PROJECT_YML" >> $GITHUB_ENV

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          else
            echo "XcodeGen already installed."
            xcodegen --version
          fi

      - name: Generate Xcode Project
        run: |
          PROJECT_DIR=$(dirname "$PROJECT_YML")

          cd "$PROJECT_DIR"

          xcodegen generate

      - name: Find generated Xcode project
        run: |
          XCODEPROJ=$(find extracted -name "*.xcodeproj" | head -n 1)

          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: .xcodeproj not generated."
            exit 1
          fi

          echo "FOUND XCODE PROJECT:"
          echo "$XCODEPROJ"

          echo "XCODEPROJ=$XCODEPROJ" >> $GITHUB_ENV

      - name: Build tvOS DEVICE app unsigned
        run: |
          APP_DIR=$(dirname "$XCODEPROJ")

          cd "$APP_DIR"

          xcodebuild \
            -project "$(basename "$XCODEPROJ")" \
            -scheme DebridChannelsTVOS \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build/DerivedData" \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Find built app
        run: |
          APP_FILE=$(find "$GITHUB_WORKSPACE/build/DerivedData/Build/Products/Release-appletvos" -name "*.app" | head -n 1)

          if [ -z "$APP_FILE" ]; then
            echo "ERROR: Built tvOS device app not found."
            exit 1
          fi

          echo "FOUND APP:"
          echo "$APP_FILE"

          echo "APP_FILE=$APP_FILE" >> $GITHUB_ENV

      - name: Create Payload
        run: |
          rm -rf Payload
          mkdir -p Payload

          cp -R "$APP_FILE" Payload/

          echo "Payload contents:"
          find Payload | head -n 100

      - name: Create unsigned IPA
        run: |
          zip -qry DebridChannelsTVOS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS-Unsigned-IPA
          path: DebridChannelsTVOS_unsigned.ipa
          
