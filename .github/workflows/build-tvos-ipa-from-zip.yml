name: 00 Build tvOS IPA From Source ZIP - UNIVERSAL

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted build Payload *.ipa
          mkdir -p extracted

      - name: Extract newest source ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | sort | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found in repo root."
            exit 1
          fi

          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          find extracted -maxdepth 6 -type f | sort

      - name: Find project.yml
        run: |
          PROJECT_YML=$(find extracted -name "project.yml" | head -n 1)

          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_YML")

          echo "PROJECT_YML=$PROJECT_YML" >> $GITHUB_ENV
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          echo "Using project.yml: $PROJECT_YML"
          echo "Using project dir: $PROJECT_DIR"

      - name: Show build/version markers
        run: |
          echo "Searching app source markers..."
          find "$PROJECT_DIR" -type f \( -name "*.swift" -o -name "*.plist" -o -name "*.yml" \) -print
          grep -RniE "Build v|TRUE SPLIT|LOCKED SPLIT|premium logo|blue glow|CFBundleShortVersionString|CFBundleVersion" "$PROJECT_DIR" || true

      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Build tvOS App Unsigned
        run: |
          PROJECT=$(find extracted -name "*.xcodeproj" | head -n 1)

          if [ -z "$PROJECT" ]; then
            echo "ERROR: Xcode project not found."
            exit 1
          fi

          echo "Using Xcode project: $PROJECT"

          xcodebuild \
            -project "$PROJECT" \
            -scheme DebridChannelsTVOS \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Create Unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-appletvos -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Built .app not found."
            exit 1
          fi

          echo "Using built app: $APP_PATH"

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" Payload/*.app/Info.plist)

          if [ -z "$EXECUTABLE" ]; then
            echo "ERROR: CFBundleExecutable missing."
            exit 1
          fi

          if [ ! -f "Payload/"*.app/"$EXECUTABLE" ]; then
            echo "ERROR: Bundle executable file missing: $EXECUTABLE"
            exit 1
          fi

          echo "Bundle executable: $EXECUTABLE"

          zip -r DebridChannelsTVOS_UNSIGNED.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS_UNSIGNED
          path: DebridChannelsTVOS_UNSIGNED.ipa
