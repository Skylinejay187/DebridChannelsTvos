name: 00 Build tvOS IPA From Source ZIP - CLEAN ONLY

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted build Payload *.ipa
          mkdir -p extracted

      - name: Extract ONLY newest uploaded ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | sort | tail -n 1)
          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          find extracted -maxdepth 5 -type f | sort

      - name: Verify correct source marker
        run: |
          APP_SOURCE=$(find extracted -type d -name "Sources" | head -n 1)

          echo "Checking source folder: $APP_SOURCE"

          if [ -z "$APP_SOURCE" ]; then
            echo "ERROR: Sources folder not found."
            exit 1
          fi

          if grep -R "v45 premium logo" "$APP_SOURCE"; then
            echo "ERROR: Old v45 app source detected. Stopping build."
            exit 1
          fi

          if ! grep -R "v53 TRUE SPLIT ACTIVE ROOT SOURCE" "$APP_SOURCE"; then
            echo "ERROR: New v53 marker not found in app source. Wrong source ZIP."
            exit 1
          fi

      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode Project
        run: |
          PROJECT_YML=$(find extracted -name "project.yml" | head -n 1)

          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_YML")
          cd "$PROJECT_DIR"
          xcodegen generate

      - name: Build tvOS App Unsigned
        run: |
          PROJECT=$(find extracted -name "*.xcodeproj" | head -n 1)

          if [ -z "$PROJECT" ]; then
            echo "ERROR: Xcode project not found."
            exit 1
          fi

          xcodebuild \
            -project "$PROJECT" \
            -scheme DebridChannelsTVOS \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Create Unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-appletvos -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Built .app not found."
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" Payload/*.app/Info.plist

          zip -r DebridChannelsTVOS_v53_UNSIGNED.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS_v53_UNSIGNED
          path: DebridChannelsTVOS_v53_UNSIGNED.ipa
