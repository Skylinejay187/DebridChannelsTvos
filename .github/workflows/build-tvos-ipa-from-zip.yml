name: 00 Build tvOS IPA From Source ZIP

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: find . -maxdepth 4 -type f | sort

      - name: Find Source ZIP
        id: findzip
        run: |
          ZIP_FILE=$(find . -type f -name "*.zip" | head -n 1)
          echo "FOUND ZIP: $ZIP_FILE"
          if [ -z "$ZIP_FILE" ]; then exit 1; fi
          echo "zip_path=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Extract Source ZIP
        run: |
          rm -rf extracted
          mkdir extracted
          unzip -q "${{ steps.findzip.outputs.zip_path }}" -d extracted
          find extracted -maxdepth 5 -type f | sort

      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode Project
        id: project
        run: |
          PROJECT_YML=$(find extracted -name "project.yml" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_YML")
          cd "$PROJECT_DIR"
          xcodegen generate
          cd "$GITHUB_WORKSPACE"
          PROJECT=$(find extracted -name "*.xcodeproj" | head -n 1)
          echo "project_path=$PROJECT" >> "$GITHUB_OUTPUT"

      - name: Build tvOS App Unsigned
        run: |
          xcodebuild \
            -project "${{ steps.project.outputs.project_path }}" \
            -scheme DebridChannelsTVOS \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Create Unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData -path "*.app" -type d | head -n 1)
          rm -rf Payload DebridChannelsTVOS_unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r DebridChannelsTVOS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS-unsigned-IPA
          path: DebridChannelsTVOS_unsigned.ipa
