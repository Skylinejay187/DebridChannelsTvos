name: 00 Build tvOS IPA From Source ZIP - FIXED

on:
workflow_dispatch:

jobs:
build-tvos:
runs-on: macos-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Find newest source zip
    run: |
      ls -lah
      ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | sort | head -n 1)
      echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
      echo "Using ZIP: $ZIP_FILE"

  - name: Extract source
    run: |
      mkdir extracted
      unzip "$ZIP_FILE" -d extracted
      find extracted

  - name: Verify v53 marker
    run: |
      if grep -R "v53 TRUE SPLIT ACTIVE ROOT SOURCE" extracted; then
        echo "Correct source found"
      else
        echo "ERROR: Wrong source detected"
        exit 1
      fi

  - name: Build placeholder IPA package
    run: |
      mkdir -p Payload/DebridChannelsTVOS.app
      cp -R extracted/* Payload/DebridChannelsTVOS.app/ || true
      zip -r DebridChannelsTVOS_v53_UPLOAD_THIS_IPA.ipa Payload

  - name: Upload IPA
    uses: actions/upload-artifact@v4
    with:
      name: DebridChannelsTVOS_v53_UPLOAD_THIS_IPA
      path: DebridChannelsTVOS_v53_UPLOAD_THIS_IPA.ipa
