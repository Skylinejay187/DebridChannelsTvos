name: 00 Build tvOS IPA From Source ZIP - UNIVERSAL SAFE

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted
          mkdir -p extracted

      - name: Extract newest source ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | sort | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP found in repository root."
            exit 1
          fi

          echo "Using ZIP:"
          echo "$ZIP_FILE"

          unzip -oq "$ZIP_FILE" -d extracted

          echo "Extraction complete."
          find extracted | head -n 200

      - name: Find project.yml
        run: |
          echo "Searching extracted source..."

          PROJECT_YML=$(find extracted -type f \( -name "project.yml" -o -name "*.yml" \) | grep "project.yml" | head -n 1)

          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found anywhere in extracted source."
            echo "Detected files:"
            find extracted | head -n 200
            exit 1
          fi

          echo "FOUND PROJECT FILE:"
          echo "$PROJECT_YML"

          echo "PROJECT_YML=$PROJECT_YML" >> $GITHUB_ENV

      - name: Show build/version markers
        run: |
          echo "Scanning source markers..."
          grep -R "Build v" extracted || true
          grep -R "PARALLAX" extracted || true
          grep -R "GLIDE" extracted || true

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd "$(dirname "$PROJECT_YML")"

          echo "Running XcodeGen..."
          xcodegen generate

          echo "Generated files:"
          ls

      - name: Find Xcode Project
        run: |
          XCODEPROJ=$(find extracted -name "*.xcodeproj" | head -n 1)

          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: .xcodeproj not generated."
            exit 1
          fi

          echo "FOUND XCODE PROJECT:"
          echo "$XCODEPROJ"

          echo "XCODEPROJ=$XCODEPROJ" >> $GITHUB_ENV

      - name: Build tvOS App Unsigned
        run: |
          APP_DIR=$(dirname "$XCODEPROJ")

          cd "$APP_DIR"

          xcodebuild \
            -project "$(basename "$XCODEPROJ")" \
            -scheme DebridChannelsTVOS \
            -sdk appletvsimulator \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Find Built .app
        run: |
          APP_FILE=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)

          if [ -z "$APP_FILE" ]; then
            echo "ERROR: Built .app not found."
            exit 1
          fi

          echo "FOUND APP:"
          echo "$APP_FILE"

          echo "APP_FILE=$APP_FILE" >> $GITHUB_ENV

      - name: Create Unsigned IPA
        run: |
          rm -rf Payload
          mkdir Payload

          cp -R "$APP_FILE" Payload/

          zip -qry DebridChannelsTVOS_unsigned.ipa Payload

          echo "IPA created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS-Unsigned-IPA
          path: DebridChannelsTVOS_unsigned.ipa

      - name: Complete
        run: |
          echo "UNIVERSAL TVOS BUILD COMPLETE"
