name: Build tvOS IPA From ZIP

on:
  workflow_dispatch:

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: |
          echo "ROOT FILES:"
          ls -R

      - name: Find Source ZIP
        id: findzip
        run: |
          ZIP_FILE=$(find . -type f -name "*.zip" | head -n 1)

          echo "FOUND ZIP:"
          echo "$ZIP_FILE"

          if [ -z "$ZIP_FILE" ]; then
            echo "NO ZIP FILE FOUND"
            exit 1
          fi

          echo "zip_path=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Extract Source ZIP
        run: |
          mkdir extracted

          unzip "${{ steps.findzip.outputs.zip_path }}" -d extracted

          echo "EXTRACTED FILES:"
          ls -R extracted

      - name: Locate Xcode Project
        id: locateproject
        run: |
          PROJECT=$(find extracted -name "*.xcodeproj" | head -n 1)

          echo "FOUND PROJECT:"
          echo "$PROJECT"

          if [ -z "$PROJECT" ]; then
            echo "NO XCODE PROJECT FOUND"
            exit 1
          fi

          echo "project_path=$PROJECT" >> $GITHUB_OUTPUT

      - name: Build tvOS App
        run: |
          xcodebuild \
            -project "${{ steps.locateproject.outputs.project_path }}" \
            -scheme DebridChannelsTVOS \
            -sdk appletvos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find Built App
        id: findapp
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)

          echo "FOUND APP:"
          echo "$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "NO BUILT APP FOUND"
            exit 1
          fi

          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Create IPA
        run: |
          mkdir Payload

          cp -R "${{ steps.findapp.outputs.app_path }}" Payload/

          zip -r DebridChannelsTVOS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS-IPA
          path: DebridChannelsTVOS_unsigned.ipa
