name: 00 Build tvOS IPA From Source ZIP - ANY ZIP

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "*.zip"
      - ".github/workflows/**"

jobs:
  build-tvos:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Prepare Clean Build Folder
        run: |
          rm -rf extracted
          rm -rf build
          rm -rf Payload
          rm -f DebridChannelsTVOS_unsigned.ipa
          mkdir -p extracted

      - name: Find newest ZIP in repository root
        id: findzip
        run: |
          echo "Available ZIP files:"
          find . -maxdepth 1 -type f -name "*.zip" -print | sort

          ZIP_FILE="$(ls -t ./*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found in repository root."
            exit 1
          fi

          echo "Using ZIP: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Extract Source ZIP
        run: |
          unzip -q "${{ steps.findzip.outputs.zip_file }}" -d extracted

          echo "Extracted contents:"
          find extracted -maxdepth 3 -type f | head -200

      - name: Locate Xcode Project
        id: locate
        run: |
          PROJECT_FILE="$(find extracted -name "*.xcodeproj" -type d | head -n 1)"
          WORKSPACE_FILE="$(find extracted -name "*.xcworkspace" -type d | head -n 1)"

          if [ -n "$WORKSPACE_FILE" ]; then
            echo "Found workspace: $WORKSPACE_FILE"
            echo "build_type=workspace" >> "$GITHUB_OUTPUT"
            echo "build_file=$WORKSPACE_FILE" >> "$GITHUB_OUTPUT"
          elif [ -n "$PROJECT_FILE" ]; then
            echo "Found project: $PROJECT_FILE"
            echo "build_type=project" >> "$GITHUB_OUTPUT"
            echo "build_file=$PROJECT_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: No .xcodeproj or .xcworkspace found after extraction."
            exit 1
          fi

      - name: Detect Scheme
        id: scheme
        run: |
          BUILD_FILE="${{ steps.locate.outputs.build_file }}"
          BUILD_TYPE="${{ steps.locate.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -list -workspace "$BUILD_FILE"
            SCHEME="$(xcodebuild -list -workspace "$BUILD_FILE" | awk '/Schemes:/{flag=1;next} flag && NF {print $1; exit}')"
          else
            xcodebuild -list -project "$BUILD_FILE"
            SCHEME="$(xcodebuild -list -project "$BUILD_FILE" | awk '/Schemes:/{flag=1;next} flag && NF {print $1; exit}')"
          fi

          if [ -z "$SCHEME" ]; then
            echo "ERROR: Could not detect Xcode scheme."
            exit 1
          fi

          echo "Using scheme: $SCHEME"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build tvOS App
        run: |
          BUILD_FILE="${{ steps.locate.outputs.build_file }}"
          BUILD_TYPE="${{ steps.locate.outputs.build_type }}"
          SCHEME="${{ steps.scheme.outputs.scheme }}"

          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild \
              -workspace "$BUILD_FILE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk appletvos \
              -destination 'generic/platform=tvOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          else
            xcodebuild \
              -project "$BUILD_FILE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk appletvos \
              -destination 'generic/platform=tvOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          fi

      - name: Locate Built App
        id: builtapp
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release-appletvos/*.app" -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Built .app not found."
            exit 1
          fi

          echo "Built app: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "${{ steps.builtapp.outputs.app_path }}" Payload/
          zip -qry DebridChannelsTVOS_unsigned.ipa Payload

          echo "Created IPA:"
          ls -lh DebridChannelsTVOS_unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannelsTVOS_unsigned_ipa
          path: DebridChannelsTVOS_unsigned.ipa
          if-no-files-found: error
